---
- name: Pull Kubernetes images
  command: kubeadm config images pull
  register: pull_images
  changed_when: "'Pulled' in pull_images.stdout"
  ignore_errors: yes

- name: Check if Kubernetes is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

- name: Initialize Kubernetes cluster
  command: kubeadm init --pod-network-cidr=10.10.0.0/16
  when: not k8s_admin_conf.stat.exists

- name: Create .kube directory for the regular user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy admin.conf to regular user's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Download Cilium CLI
  get_url:
    url: https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz
    dest: /tmp/cilium-linux-amd64.tar.gz

- name: Extract Cilium CLI
  unarchive:
    src: /tmp/cilium-linux-amd64.tar.gz
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/cilium

- name: Check if Cilium is installed
  command: cilium status
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_status
  ignore_errors: yes
  changed_when: false

- name: Install Cilium CNI
  command: cilium install --helm-set ipam.mode=kubernetes --helm-set ipv4NativeRoutingCIDR=10.10.0.0/16
  environment:
    KUBECONFIG: /home/{{ ansible_user }}/.kube/config
  when: cilium_status.rc != 0

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command_raw

- name: Set join command fact
  set_fact:
    join_command: "{{ join_command_raw.stdout_lines[0] }}"
